# nginx reverse proxy for the ELPC Outline fork on a Duke RAPID VM.
#
# Pairing: Outline runs in docker-compose.prod.yml bound to 127.0.0.1:3000; this
# terminates TLS on 443 and proxies to it. Use nginx (NOT Caddy) with a
# certbot-managed Let's Encrypt cert — the lesson from the QuickSummary deploy:
#   * certbot stays the sole cert manager (auto-renews ~every 90 days); Caddy
#     wants to manage its own certs, so the two would fight.
#   * nginx starts its master as root, reads the cert at load, then drops to a
#     worker — so it reads root-owned /etc/letsencrypt keys natively. Caddy runs
#     as the unprivileged `caddy` user and can't read those 0600 keys.
#   * Point at the live/ SYMLINK dir (below), not archive/: certbot swaps the
#     symlinks in place on renewal, so a reload serves the new cert with no edits.
#
# Install:
#   sudo cp deploy/nginx-outline.conf /etc/nginx/sites-available/outline
#   # edit server_name + the cert paths below to your domain
#   sudo ln -s /etc/nginx/sites-available/outline /etc/nginx/sites-enabled/outline
#   sudo nginx -t && sudo systemctl reload nginx
#   # make nginx pick up renewed certs automatically:
#   echo -e '#!/bin/sh\nsystemctl reload nginx' | sudo tee /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
#   sudo chmod +x /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh
#   sudo certbot renew --dry-run    # confirms renewal + the reload hook fire
#
# Firewall: open 80 (http->https redirect) and 443 only. The app stays on
# 127.0.0.1, so it is unreachable except through this proxy.

# Required so the WebSocket Upgrade header is forwarded — Outline uses WebSockets
# for realtime updates AND collaborative editing (Hocuspocus). Without this,
# pages load but realtime/collab silently break.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name outline.CHANGE_ME.duke.edu;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name outline.CHANGE_ME.duke.edu;

    # certbot live/ symlinks — edit the domain to match `certbot certificates`.
    ssl_certificate     /etc/letsencrypt/live/outline.CHANGE_ME.duke.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/outline.CHANGE_ME.duke.edu/privkey.pem;

    # PDF uploads: nginx's 1 MB default would reject them. Keep this >= Outline's
    # FILE_STORAGE_UPLOAD_MAX_SIZE (default 250 MB).
    client_max_body_size 256m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket upgrade (realtime + collaboration).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Tells Outline it is behind https — REQUIRED for OIDC redirects (and any
        # absolute links) to use https rather than http.
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI summary/embedding/answer calls run within the request; summaries can
        # take 20-40s, so allow generous upstream timeouts.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
